server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ไฟล์ frontend แบบ static (index.html, app.js, style.css)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy คำขอ API ไปที่ backend service (docker network hostname: backend)
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy health check ไปที่ backend service
    location /health {
        proxy_pass http://backend:3000/health;
        proxy_set_header Host $host;
    }
}
