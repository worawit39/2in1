version: "3.9"

# docker-compose.yml — สำหรับ Development
# build image ของ backend/frontend จาก source code ในเครื่อง แล้วรันร่วมกับ PostgreSQL

services:
  db:
    image: postgres:16-alpine
    container_name: notebook-shop-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_this_password}
      POSTGRES_DB: ${DB_NAME:-laptop_market}
    # หมายเหตุความปลอดภัย: ไม่ expose port 5432 ออกสู่ host โดย default
    # backend เข้าถึง db ผ่าน docker network ภายใน (hostname "db") อยู่แล้ว ไม่จำเป็นต้องเปิดพอร์ตออกนอกเครื่อง
    # ถ้าต้องการต่อด้วย psql/DBeaver จากเครื่อง host เพื่อ debug ให้ uncomment บรรทัดด้านล่าง
    # ports:
    #   - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-laptop_market}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: notebook-shop-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-change_this_password}
      DB_NAME: ${DB_NAME:-laptop_market}
      PORT: ${PORT:-3000}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: notebook-shop-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend

volumes:
  pgdata:
